name: Publish KraftAdmin Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Stage artifacts
        run: ./gradlew :kraft-admin:publishMavenJavaPublicationToStagingDirRepository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Debug signing env
        run: |
            echo "Key present: $( [ -n "$GPG_PRIVATE_KEY" ] && echo yes || echo NO )"
            echo "Key starts with: ${GPG_PRIVATE_KEY:0:30}"
            echo "Passphrase present: $( [ -n "$GPG_PASSPHRASE" ] && echo yes || echo NO )"
          env:
            GPG_PRIVATE_KEY: ${{ secrets.GPG_KEY }}
            GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify signatures
        run: |
          ASC_COUNT=$(find kraft-admin/build/staging-deploy -name "*.asc" | wc -l)
          echo "Signature files found: $ASC_COUNT"
          find kraft-admin/build/staging-deploy -type f | sort
          [ "$ASC_COUNT" -gt 0 ] || { echo "❌ Signing failed — no .asc files"; exit 1; }

      - name: Zip staging directory
        run: |
          cd kraft-admin/build/staging-deploy
          zip -r ../bundle.zip .

      - name: Upload to Maven Central Portal
        run: |
          RESPONSE=$(curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $(echo -n '${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}' | base64 -w 0)" \
            --form "bundle=@kraft-admin/build/bundle.zip;type=application/octet-stream" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")
          echo "Deployment ID: $RESPONSE"

      - name: Generate GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kraft-admin/build/libs/*.jar
          prerelease: ${{ contains(github.ref, 'beta') }}