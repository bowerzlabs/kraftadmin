name: Publish KraftAdmin Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Semantic Version to publish (e.g., 1.0.0-ALPHA, 1.0.0)'
        required: true
        default: '1.0.0-ALPHA'
      is_prerelease:
        description: 'Is this a pre-release build?'
        type: boolean
        required: true
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ✅ needed — full history so we can diff against the previous tag

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject Release Version
        run: |
          if grep -q "^version=" gradle.properties; then
            sed -i "s/^version=.*/version=${{ github.event.inputs.release_version }}/" gradle.properties
          else
            echo "version=${{ github.event.inputs.release_version }}" >> gradle.properties
          fi
          echo "Injected version: $(grep '^version=' gradle.properties)"

      - name: Run tests
        run: ./gradlew :kraft-pulse:test :kraft-admin:test

      - name: Stage kraft-pulse artifacts
        run: ./gradlew :kraft-pulse:publishMavenJavaPublicationToStagingDirRepository
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Stage kraft-admin artifacts
        run: ./gradlew :kraft-admin:publishMavenJavaPublicationToStagingDirRepository
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify signatures
        run: |
          for module in kraft-pulse kraft-admin; do
            ASC_COUNT=$(find $module/build/staging-deploy -name "*.asc" | wc -l)
            echo "$module signature files found: $ASC_COUNT"
            find $module/build/staging-deploy -type f | sort
            [ "$ASC_COUNT" -gt 0 ] || { echo "Signing failed for $module — no .asc files"; exit 1; }
          done

      - name: Zip staging directories
        run: |
          cd kraft-pulse/build/staging-deploy && zip -r ../bundle.zip . && cd -
          cd kraft-admin/build/staging-deploy && zip -r ../bundle.zip . && cd -

      - name: Upload kraft-pulse to Maven Central
        run: |
          RESPONSE=$(curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $(echo -n '${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}' | base64 -w 0)" \
            --form "bundle=@kraft-pulse/build/bundle.zip;type=application/octet-stream" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")
          echo "kraft-pulse Deployment ID: $RESPONSE"

      - name: Upload kraft-admin to Maven Central
        run: |
          RESPONSE=$(curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $(echo -n '${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}' | base64 -w 0)" \
            --form "bundle=@kraft-admin/build/bundle.zip;type=application/octet-stream" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")
          echo "kraft-admin Deployment ID: $RESPONSE"

      # ✅ New — derive a changelog from commits since the last tag, grouped by module
      - name: Derive changelog from commits
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found — including full history."
            RANGE="HEAD"
          else
            echo "Previous tag: $PREVIOUS_TAG"
            RANGE="$PREVIOUS_TAG..HEAD"
          fi

          {
            echo "changelog<<EOF"
            echo "## What's Changed"
            echo ""

            echo "### kraft-pulse"
            git log "$RANGE" --pretty=format:"- %s (%h)" -- kraft-pulse/ || echo "- No changes"
            echo ""
            echo ""

            echo "### kraft-admin"
            git log "$RANGE" --pretty=format:"- %s (%h)" -- kraft-admin/ || echo "- No changes"
            echo ""
            echo ""

            echo "### Other"
            git log "$RANGE" --pretty=format:"- %s (%h)" -- . ":!kraft-pulse" ":!kraft-admin" || echo "- No changes"
            echo ""

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Step 1: Create release as draft so it is mutable
      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.release_version }}
          name: Release v${{ github.event.inputs.release_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: true
          prerelease: ${{ github.event.inputs.is_prerelease }}
          files: |
            kraft-pulse/build/libs/kraft-pulse-*.jar
            kraft-admin/build/libs/kraft-admin-*.jar

      # Step 2: Publish the draft — makes it visible, assets already attached
      - name: Publish release
        run: |
          curl --fail-with-body \
            --request PATCH \
            --header "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            --header "Accept: application/vnd.github+json" \
            --data '{"draft": false}' \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.id }}"
