kraftadmin:
  base-path: /admin
  title: "KraftAdmin Dashboard"
  logo-url: "https://your-assets.com/logo.png"

  # 2. Theme Settings
  theme:
    primary-color: "#3b82f6"
    dark-mode: true

  # 3. Storage Settings
  storage:
    upload-dir: "uploads/admin"
    public-url-prefix: "/admin/files"

  # 4. Security Settings
  security:
    session-expiry-minutes: 120
    required-roles:
      - ROLE_ADMIN
      - ROLE_SUPERUSER
      - ROLE_USER
    # Example for the Map<String, Set<String>> structure
    protected-routes:
      "/api/users/**": ["ROLE_SUPERUSER"]
      "/api/settings/**": ["ROLE_ADMIN"]
    cookie-name: "EVRY_ADMIN_SESSION"
    basic-auth:
      username: "boaz@bowerzlabs.com"
      password: "password"

  # 5. Pagination Settings
  pagination:
    default-page-size: 20
    max-page-size: 100

  # 6. Feature Toggles
  features:
    allow-delete: true
    show-timestamps: true
    read-only: false

  # 7. Locale & Timezone
  locale-config:
    default-language: "en"
    timezone: "Africa/Nairobi"

  # 8. Telemetry (The 0.1.0 BI Heartbeat)
  telemetry-config:
    cloud-url: "http://localhost:8090"
    enabled: true